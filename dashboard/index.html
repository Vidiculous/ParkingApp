<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parking Status</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      padding: 2rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    #subtitle {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 1rem;
    }

    #status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
      margin-right: 6px;
      vertical-align: middle;
    }
    #status-dot.connected { background: #22c55e; }

    #occupancy-banner {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1.25rem;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      font-size: 0.9rem;
      font-weight: 500;
      color: #15803d;
      transition: background 0.2s, color 0.2s;
    }

    #occupancy-banner.full {
      background: #fff1f2;
      border-color: #fecdd3;
      color: #be123c;
    }

    #occupancy-bar-wrap {
      flex: 1;
      height: 8px;
      background: #dcfce7;
      border-radius: 4px;
      overflow: hidden;
    }
    #occupancy-banner.full #occupancy-bar-wrap { background: #fecdd3; }

    #occupancy-bar {
      height: 100%;
      background: #22c55e;
      border-radius: 4px;
      transition: width 0.3s;
    }
    #occupancy-banner.full #occupancy-bar { background: #f43f5e; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    th {
      text-align: left;
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      background: #fafafa;
      border-bottom: 1px solid #e5e5e5;
    }

    td {
      padding: 0.875rem 1rem;
      font-size: 0.9rem;
      border-bottom: 1px solid #f0f0f0;
    }

    tr:last-child td { border-bottom: none; }

    tr.parked { background: #f0fdf4; }
    tr.left   { background: #fff; }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge.parked { background: #dcfce7; color: #15803d; }
    .badge.left   { background: #f3f4f6; color: #6b7280; }

    .manual-tag {
      font-size: 0.7rem;
      color: #9ca3af;
      margin-left: 6px;
    }

    #empty {
      text-align: center;
      padding: 3rem;
      color: #9ca3af;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <h1>Parking Status</h1>
  <p id="subtitle">
    <span id="status-dot"></span>
    <span id="conn-label">Connecting…</span>
  </p>

  <div id="occupancy-banner">
    <span id="occupancy-text">— / 7 spots occupied</span>
    <div id="occupancy-bar-wrap">
      <div id="occupancy-bar" style="width:0%"></div>
    </div>
  </div>

  <table id="table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Dongle</th>
        <th>Status</th>
        <th>Since</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="4" id="empty">No data yet.</td></tr>
    </tbody>
  </table>

  <script>
    const tbody   = document.getElementById('tbody');
    const dot     = document.getElementById('status-dot');
    const label   = document.getElementById('conn-label');
    const banner  = document.getElementById('occupancy-banner');
    const occText = document.getElementById('occupancy-text');
    const occBar  = document.getElementById('occupancy-bar');

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function fmt(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function renderOccupancy(occ) {
      if (!occ) return;
      const pct = Math.min(100, Math.round((occ.parked / occ.total) * 100));
      occText.textContent = occ.full
        ? `Parking lot full (${occ.parked} / ${occ.total})`
        : `${occ.parked} / ${occ.total} spots occupied`;
      occBar.style.width = pct + '%';
      banner.classList.toggle('full', occ.full);
    }

    function render(data) {
      const users = data.users || data;   // fallback for old format
      const occ   = data.occupancy || null;

      renderOccupancy(occ);

      const entries = Object.entries(users);
      if (entries.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" id="empty">No data yet.</td></tr>';
        return;
      }

      entries.sort(([aName, aVal], [bName, bVal]) => {
        if (aVal.status === bVal.status) return aName.localeCompare(bName);
        return aVal.status === 'parked' ? -1 : 1;
      });

      tbody.innerHTML = entries.map(([name, v]) => `
        <tr class="${esc(v.status)}">
          <td>${esc(name)}</td>
          <td>${esc(v.dongle_id)}</td>
          <td>
            <span class="badge ${esc(v.status)}">${v.status === 'parked' ? 'Parked' : 'Away'}</span>
            ${v.manual ? '<span class="manual-tag">(manual)</span>' : ''}
          </td>
          <td>${fmt(v.since)}</td>
        </tr>
      `).join('');
    }

    function connect() {
      const wsUrl = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws`;
      const ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        dot.className = 'connected';
        label.textContent = 'Live';
      };

      ws.onmessage = (e) => {
        try { render(JSON.parse(e.data)); } catch (err) {
          console.warn('Failed to parse WS message:', err);
        }
      };

      ws.onclose = () => {
        dot.className = '';
        label.textContent = 'Reconnecting…';
        setTimeout(connect, 3000);
      };

      ws.onerror = () => ws.close();
    }

    connect();
  </script>
</body>
</html>
